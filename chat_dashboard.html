<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Dzwirovaci chytrackovani</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>:root {
  --bg: #0f1117;
  --bg2: #131929;
  --bg3: #161b28;
  --bg4: #1e2330;
  --bg5: #252d3d;
  --bgsel: #0e1f35;
  --bgnote: #0c1524;
  --sep: #111827;
  --brd1: #1a2035;
  --brd2: #1e2a3a;
  --brd3: #2d3748;
  --t0: #f8fafc;
  --t1: #f1f5f9;
  --t2: #e2e8f0;
  --t3: #cbd5e1;
  --t4: #94a3b8;
  --t5: #64748b;
  --t6: #475569;
  --t7: #334155;
  --t8: #1e293b;
}

@media (prefers-color-scheme: light) {
  :root:not([data-theme="dark"]) {
    --bg: #f8fafc;
    --bg2: #ffffff;
    --bg3: #f1f5f9;
    --bg4: #e8edf5;
    --bg5: #d1d5db;
    --bgsel: #dbeafe;
    --bgnote: #eff6ff;
    --sep: #e9ecef;
    --brd1: #e2e8f0;
    --brd2: #cbd5e1;
    --brd3: #94a3b8;
    --t0: #0f172a;
    --t1: #1e293b;
    --t2: #1e293b;
    --t3: #334155;
    --t4: #475569;
    --t5: #64748b;
    --t6: #94a3b8;
    --t7: #94a3b8;
    --t8: #c8d3de;
  }
}

[data-theme="dark"]  {
  --bg: #0f1117;
  --bg2: #131929;
  --bg3: #161b28;
  --bg4: #1e2330;
  --bg5: #252d3d;
  --bgsel: #0e1f35;
  --bgnote: #0c1524;
  --sep: #111827;
  --brd1: #1a2035;
  --brd2: #1e2a3a;
  --brd3: #2d3748;
  --t0: #f8fafc;
  --t1: #f1f5f9;
  --t2: #e2e8f0;
  --t3: #cbd5e1;
  --t4: #94a3b8;
  --t5: #64748b;
  --t6: #475569;
  --t7: #334155;
  --t8: #1e293b;
}

[data-theme="light"] {
  --bg: #f8fafc;
  --bg2: #ffffff;
  --bg3: #f1f5f9;
  --bg4: #e8edf5;
  --bg5: #d1d5db;
  --bgsel: #dbeafe;
  --bgnote: #eff6ff;
  --sep: #e9ecef;
  --brd1: #e2e8f0;
  --brd2: #cbd5e1;
  --brd3: #94a3b8;
  --t0: #0f172a;
  --t1: #1e293b;
  --t2: #1e293b;
  --t3: #334155;
  --t4: #475569;
  --t5: #64748b;
  --t6: #94a3b8;
  --t7: #94a3b8;
  --t8: #c8d3de;
}

.theme-btn{display:flex;align-items:center;justify-content:center;background:none;border:1px solid var(--brd2);border-radius:8px;color:var(--t5);cursor:pointer;padding:4px 7px;font-size:.82rem;line-height:1;transition:all .15s;-webkit-tap-highlight-color:transparent}
.theme-btn:hover{border-color:var(--brd3);background:var(--bg4)}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--t2);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.header{padding:12px 18px 0;flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between}
.header-left h1{font-size:1.1rem;font-weight:700;color:var(--t0);letter-spacing:-.02em}
.header-left p{font-size:.68rem;color:var(--t7);margin-top:1px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--t7);margin-top:5px;flex-shrink:0}
.sync-dot.online{background:#22c55e}
.sync-dot.syncing{background:#f59e0b;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.refresh-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:1px solid var(--brd2);border-radius:8px;color:var(--t6);cursor:pointer;padding:4px 8px;font-size:.62rem;transition:all .15s;-webkit-tap-highlight-color:transparent}
.refresh-btn:hover{border-color:var(--t7);color:var(--t5)}
.refresh-btn:active{background:var(--bg4)}
.refresh-btn span{font-size:.7rem}
.refresh-time{font-size:.58rem;color:var(--t7)}
.tabs{display:flex;gap:5px;padding:8px 18px 0;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 13px;border-radius:9px;border:none;cursor:pointer;font-size:.76rem;font-weight:600;transition:all .15s;background:var(--bg4);color:var(--t5);white-space:nowrap;flex-shrink:0}
.tab:hover{background:var(--bg5);color:var(--t4)}
.tab.active{color:#fff}
.tab[data-cat="tripiky"].active{background:#1d4ed8}
.tab[data-cat="restaurace"].active{background:#065f46}
.tab[data-cat="darky"].active{background:#7c2d12}
.tab[data-cat="zabava"].active{background:#4c1d95}
.tab[data-cat="ostatni"].active{background:var(--t8)}
.card-cat.zabava{color:#a78bfa}
.card-cat.ostatni{color:var(--t4)}
.zab-type-chip{font-size:.65rem;font-weight:600;color:var(--t4);background:var(--brd1);border-radius:5px;padding:1px 6px;vertical-align:middle}
.tab-count{display:inline-block;padding:1px 5px;border-radius:8px;font-size:.65rem;margin-left:3px;background:rgba(255,255,255,.1);color:var(--t4)}
.tab.active .tab-count{background:rgba(255,255,255,.2);color:#fff}
.main{display:flex;flex:1;overflow:hidden;margin-top:8px}
.list-panel{width:340px;min-width:200px;border-right:1px solid var(--brd1);overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
.list-panel::-webkit-scrollbar{width:3px}
.list-panel::-webkit-scrollbar-thumb{background:var(--brd3);border-radius:3px}
.filter-bar{padding:7px 8px;position:sticky;top:0;background:var(--bg);z-index:10;display:flex;gap:5px;flex-shrink:0}
.filter-bar input{flex:1;padding:6px 10px;border-radius:7px;border:1px solid var(--brd2);background:var(--bg3);color:var(--t2);font-size:.75rem;outline:none;min-width:0}
.filter-bar input:focus{border-color:#3b82f6}
.filter-bar input::placeholder{color:var(--t7)}
.sender-filter{display:flex;gap:3px;flex-shrink:0}
.sf-btn{padding:4px 7px;border-radius:6px;border:1px solid var(--brd2);cursor:pointer;font-size:.64rem;font-weight:700;background:var(--bg3);color:var(--t6);transition:all .12s;white-space:nowrap}
.sf-btn.act-all{background:var(--bg4);border-color:var(--t7);color:var(--t4)}
.sf-btn.act-j{background:#1e3a5f;border-color:#3b82f6;color:#60a5fa}
.sf-btn.act-a{background:#431407;border-color:#ea580c;color:#fb923c}
.sf-btn.act-n{background:#14291a;border-color:#16a34a;color:#4ade80}
.list-body{flex:1;overflow-y:auto}
.list-body::-webkit-scrollbar{width:3px}
.list-body::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:3px}
.group-label{padding:5px 11px 2px;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t7);margin-top:2px}
.separator{height:1px;background:var(--sep);margin:3px 0}
.item{padding:7px 9px 7px 11px;cursor:pointer;border-left:3px solid transparent;transition:background .1s;display:flex;align-items:flex-start;gap:7px}
.item:hover{background:var(--bg2)}
.item.selected{background:var(--bgsel);border-left-color:#3b82f6}
.item.visited .item-name{color:var(--t6);text-decoration:line-through}
.avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:800;flex-shrink:0;margin-top:1px}
.av-j{background:#1e3a5f;color:#60a5fa}
.av-a{background:#431407;color:#fb923c}
.av-n{background:#14291a;color:#4ade80}
.item-main{flex:1;min-width:0}
.item-name{font-size:.77rem;color:var(--t3);font-weight:500;line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.item-meta{font-size:.64rem;color:var(--t7);display:flex;gap:4px;align-items:center;flex-wrap:wrap;margin-top:2px}
.link-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;flex-shrink:0}
.dist-badge{background:var(--brd2);color:#60a5fa;border-radius:5px;padding:1px 5px;font-size:.62rem;font-weight:600;white-space:nowrap}
.dist-custom{background:#14291a;color:#4ade80}
.addr-section{margin-top:10px;padding-top:10px;border-top:1px solid var(--brd1)}
.addr-btn{padding:6px 12px;border-radius:7px;border:1px solid #1e3a5f;background:var(--bgnote);color:#60a5fa;font-size:.75rem;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
.addr-btn:disabled{opacity:.5;cursor:default}
.addr-clear-btn{margin-top:6px;padding:3px 9px;border-radius:6px;border:1px solid #2d1a1a;background:#1a0a0a;color:#ef4444;font-size:.65rem;cursor:pointer}
.type-badge{font-size:.72rem;line-height:1;flex-shrink:0}
.dine-type-chip{font-size:.65rem;font-weight:600;color:var(--t4);background:var(--brd1);border-radius:5px;padding:1px 6px;vertical-align:middle}
.item-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.mini-stars{font-size:.62rem;color:#f59e0b;line-height:1;letter-spacing:-1px}
.visited-check{font-size:.68rem;color:#22c55e}
.detail-panel{flex:1;padding:16px 20px;overflow-y:auto}
.detail-panel::-webkit-scrollbar{width:3px}
.detail-panel::-webkit-scrollbar-thumb{background:var(--brd3);border-radius:3px}
.empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--t8);flex-direction:column;gap:8px}
.empty .icon{font-size:2rem}
.empty p{font-size:.8rem}
.back-btn{display:none;align-items:center;gap:6px;background:none;border:none;color:#60a5fa;font-size:.82rem;font-weight:600;cursor:pointer;padding:0 0 12px 0}
.card{background:var(--bg2);border-radius:12px;padding:18px 20px;max-width:580px;border:1px solid var(--brd1)}
.card-cat{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.card-cat.tripiky{color:#60a5fa}
.card-cat.restaurace{color:#34d399}
.card-cat.darky{color:#fb923c}
.card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.sender-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:.7rem;font-weight:700}
.sb-j{background:#1e3a5f;color:#60a5fa}
.sb-a{background:#431407;color:#fb923c}
.sb-n{background:#14291a;color:#4ade80}
.date-chip{font-size:.65rem;color:var(--t7)}
.card-who{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.67rem;font-weight:700;background:#7c2d12;color:#fdba74;margin-bottom:8px}
.card-title{font-size:1rem;font-weight:700;color:var(--t1);line-height:1.4;margin-bottom:12px}
.dist-block{display:flex;gap:10px;margin-bottom:12px}
.dist-item{background:var(--bgnote);border-radius:8px;padding:7px 12px;flex:1;text-align:center}
.dist-item .val{font-size:1.05rem;font-weight:700;color:#60a5fa}
.dist-item .lbl{font-size:.6rem;color:var(--t6);margin-top:1px;text-transform:uppercase;letter-spacing:.06em}
.note-box{margin-top:8px;padding:8px 11px;background:var(--bgnote);border-radius:7px;font-size:.73rem;color:var(--t6);border-left:3px solid #1e3a5f}
.open-link,.maps-link{display:inline-flex;align-items:center;gap:5px;margin-top:10px;margin-right:6px;padding:8px 14px;border-radius:8px;text-decoration:none;font-size:.75rem;font-weight:600;transition:all .12s}
.open-link{background:var(--bgnote);border:1px solid var(--brd2);color:#60a5fa}
.open-link:hover{background:#101e38;border-color:#3b82f6}
.maps-link{background:var(--bgnote);border:1px solid var(--brd2);color:#34d399}
.maps-link:hover{background:#0a1f14;border-color:#34d399}
.warning{font-size:.66rem;color:var(--t7);margin-top:5px;font-style:italic}
.user-section{margin-top:14px;border-top:1px solid var(--brd1);padding-top:12px;display:flex;flex-direction:column;gap:9px}
.user-row{display:flex;align-items:center;gap:10px}
.u-lbl{font-size:.63rem;font-weight:700;color:var(--t7);text-transform:uppercase;letter-spacing:.05em;min-width:58px}
.stars-widget{display:flex;gap:3px}
.star-btn{font-size:1.15rem;cursor:pointer;background:none;border:none;padding:0;color:var(--brd2);transition:color .1s;line-height:1;-webkit-tap-highlight-color:transparent}
.star-btn.on{color:#f59e0b}
.star-btn:hover{color:#fbbf24}
.visited-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.v-box{width:18px;height:18px;border-radius:5px;border:2px solid var(--brd3);background:var(--bgnote);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.visited-toggle.checked .v-box{background:#16a34a;border-color:#16a34a}
.v-box svg{display:none}
.visited-toggle.checked .v-box svg{display:block}
.v-text{font-size:.77rem;color:var(--t5)}
.visited-toggle.checked .v-text{color:#22c55e}
.pnote-lbl{font-size:.63rem;font-weight:700;color:var(--t7);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.pnote-ta{width:100%;background:var(--bgnote);border:1px solid var(--brd2);border-radius:7px;color:var(--t4);font-size:.75rem;padding:7px 9px;resize:vertical;min-height:55px;outline:none;font-family:inherit;line-height:1.5}
.pnote-ta:focus{border-color:#3b82f6;color:var(--t3)}
.pnote-ta::placeholder{color:#1e3a5f}
.save-hint{font-size:.61rem;color:#1e3a5f;margin-top:2px}
@media (max-width:680px){
  body{overflow:auto}
  .main{overflow:visible;flex-direction:column}
  .list-panel{width:100%;border-right:none;border-bottom:1px solid var(--brd1);min-height:0;max-height:none;overflow:visible}
  .list-body{max-height:60vh;overflow-y:auto}
  .detail-panel{position:fixed;inset:0;z-index:300;background:var(--bg);padding:14px 16px;overflow-y:auto;display:none;transform:translateX(100%);transition:transform .2s ease}
  .detail-panel.open{display:block;transform:translateX(0)}
  .back-btn{display:flex}
}
    .dup-badge { background:#fff3cd; color:#856404; font-size:10px; padding:1px 5px; border-radius:8px; border:1px solid #ffc107; margin-left:4px; vertical-align:middle; cursor:default; }
    .dup-chip  { background:#fff3cd; color:#856404; font-size:11px; padding:2px 7px; border-radius:10px; border:1px solid #ffc107; }
    .dk-toggle-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--brd2);cursor:pointer;font-size:.68rem;font-weight:700;background:var(--bg3);color:var(--t6);transition:all .12s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
    .dk-toggle-btn.active{background:#7c2d12;border-color:#ef4444;color:#fca5a5}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <h1>Dzwirovaci chytrackovani</h1>
    <p>WhatsApp 2020&ndash;26 &middot; GPS2Dvorce So 10:00 &middot; data: <span id="data-date"></span></p>
  </div>
  <div style="display:flex;align-items:flex-start;gap:8px;margin-top:2px">
    <button class="refresh-btn" onclick="doRefresh()" title="Obnovit data">
      <span>&#8635;</span>
      <div class="refresh-time" id="refresh-time"></div>
    </button>
    <button class="theme-btn" id="theme-toggle" onclick="toggleTheme()" title="Přepnout světlé/tmavé">☀️</button>
    <div class="sync-dot" id="sync-dot" title="Stav synchronizace"></div>
  </div>
</div>
<div class="tabs">
  <button class="tab active" data-cat="tripiky" onclick="switchTab('tripiky')">&#128506; Tripiky <span class="tab-count" id="cnt-tripiky"></span></button>
  <button class="tab" data-cat="restaurace" onclick="switchTab('restaurace')">&#127829; Dine&amp;Caf&eacute; <span class="tab-count" id="cnt-restaurace"></span></button>
  <button class="tab" data-cat="darky" onclick="switchTab('darky')">&#127873; D&aacute;rky <span class="tab-count" id="cnt-darky"></span></button>
  <button class="tab" data-cat="zabava" onclick="switchTab('zabava')">&#127917; Z&aacute;bava <span class="tab-count" id="cnt-zabava"></span></button>
  <button class="tab" data-cat="ostatni" onclick="switchTab('ostatni')">&#128230; Ostatn&iacute; <span class="tab-count" id="cnt-ostatni"></span></button>
</div>
<div class="main">
  <div class="list-panel">
    <div class="filter-bar">
      <input type="text" id="search" placeholder="Hledat..." oninput="renderList()">
      <div class="sender-filter">
        <button class="sf-btn act-all" id="sf-all" onclick="setSF('all')">Vse</button>
        <button class="sf-btn" id="sf-j" onclick="setSF('j')">J</button>
        <button class="sf-btn" id="sf-a" onclick="setSF('a')">A</button>

      </div>
    </div>
    <div class="filter-bar" id="darky-filter-bar" style="display:none;padding-top:0">
      <button class="dk-toggle-btn" id="dk-toggle" onclick="toggleDK()">Jen nedarované</button>
    </div>
    <div class="filter-bar" id="geo-filter-bar" style="padding-top:0">
      <div class="sender-filter" style="flex:1">
        <button class="sf-btn act-all" id="gf-all"  onclick="setGF('all')"  style="flex:1">Vše</button>
        <button class="sf-btn" id="gf-cz"   onclick="setGF('cz')"   style="flex:1">🇨🇿</button>
        <button class="sf-btn" id="gf-eu"   onclick="setGF('eu')"   style="flex:1">🇪🇺</button>
        <button class="sf-btn" id="gf-svet" onclick="setGF('svet')" style="flex:1">🌍 Svět</button>
      </div>
      <div style="display:flex;gap:3px;flex-shrink:0">
        <button class="sf-btn sort-btn" data-dir="asc"  onclick="setSort('asc')"  title="Seřadit ↑ km">↑ km</button>
        <button class="sf-btn sort-btn" data-dir="desc" onclick="setSort('desc')" title="Seřadit ↓ km">↓ km</button>
        <button class="sf-btn sort-btn" data-dir="null-first" onclick="setSort('null-first')" title="Bez km nahoru">? km</button>
      </div>
    </div>
    <div class="filter-bar" id="type-filter-bar" style="display:none;padding-top:0">
      <div class="sender-filter" style="flex:1">
        <button class="sf-btn act-all" id="tf-all" onclick="setTF('all')" style="flex:1">Vše</button>
        <button class="sf-btn" id="tf-cafe" onclick="setTF('cafe')" style="flex:1">☕ Kavárny</button>
        <button class="sf-btn" id="tf-rest" onclick="setTF('rest')" style="flex:1">🍽️ Restaurace</button>
      </div>
      <div style="display:flex;gap:3px;flex-shrink:0">
        <button class="sf-btn sort-btn" data-dir="asc"  onclick="setSort('asc')"  title="Seřadit ↑ km">↑ km</button>
        <button class="sf-btn sort-btn" data-dir="desc" onclick="setSort('desc')" title="Seřadit ↓ km">↓ km</button>
        <button class="sf-btn sort-btn" data-dir="null-first" onclick="setSort('null-first')" title="Bez km nahoru">? km</button>
      </div>
    </div>
    <div class="filter-bar" id="zab-filter-bar" style="display:none;padding-top:0">
      <div class="sender-filter" style="width:100%">
        <button class="sf-btn act-all" id="zf-all"     onclick="setZF('all')"     style="flex:1">Vše</button>
        <button class="sf-btn" id="zf-film"    onclick="setZF('film')"    style="flex:1" title="Filmy">🎬</button>
        <button class="sf-btn" id="zf-serial"  onclick="setZF('serial')"  style="flex:1" title="Seriály">📺</button>
        <button class="sf-btn" id="zf-kniha"   onclick="setZF('kniha')"   style="flex:1" title="Knihy">📚</button>
        <button class="sf-btn" id="zf-podcast" onclick="setZF('podcast')" style="flex:1" title="Podcasty">🎧</button>
        <button class="sf-btn" id="zf-hudba"   onclick="setZF('hudba')"   style="flex:1" title="Hudba">🎵</button>
        <button class="sf-btn" id="zf-recept"  onclick="setZF('recept')"  style="flex:1" title="Recepty">🍳</button>
      </div>
    </div>
    <div class="list-body" id="list-body"></div>

  // CZ — explicit keywords
  if (/\bcz\b|česk|cesk|morav|slezsk|bohemi|brdy|šumava|sumava|jeseník|jeseniky|krkonos|beskydy|besky/.test(s)) return 'cz';
  // km fallback
  if (item.km === 0) return 'cz';
  if (item.km != null && item.km <= 300) return 'cz';
  // Neznámá adresa nebo velká vzdálenost → svět
  return 'svet';
}
function dineType(item) {
  const s = ((item.name || '') + ' ' + (item.note || '')).toLowerCase();
  if (/kavarn|kavárn|café|cafe|kafe|coffee|bakehouse|pekarstv|cukrarn|cukrárn|kofarn|kofárn/.test(s)) return 'cafe';
  return 'rest';
}

function switchTab(c) {
  cat = c; sel = null; tfilt = 'all'; gfilt = 'all'; zabfilt = 'all'; sortDir = null;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.cat === c));
  document.getElementById('search').value = '';
  document.getElementById('darky-filter-bar').style.display = c === 'darky'      ? '' : 'none';
  document.getElementById('geo-filter-bar').style.display  = c === 'tripiky'    ? '' : 'none';
  document.getElementById('type-filter-bar').style.display = c === 'restaurace' ? '' : 'none';
  document.getElementById('zab-filter-bar').style.display  = c === 'zabava'     ? '' : 'none';
  if (c !== 'darky') { dkfilt = false; }
  ['all','cz','eu','svet'].forEach(x => { document.getElementById('gf-' + x).className = 'sf-btn' + (x === 'all' ? ' act-all' : ''); });
  ['all','cafe','rest'].forEach(x => { document.getElementById('tf-' + x).className = 'sf-btn' + (x === 'all' ? ' act-all' : ''); });
  ['all','film','serial','kniha','podcast','hudba','recept'].forEach(x => { document.getElementById('zf-' + x).className = 'sf-btn' + (x === 'all' ? ' act-all' : ''); });
  document.querySelectorAll('.sort-btn').forEach(b => b.className = 'sf-btn sort-btn');
  renderList();
  const dp = document.getElementById('detail');
  dp.innerHTML = '<div class="empty"><div class="icon">&#128072;</div><p>Vyber polozku vlevo</p></div>';
  dp.classList.remove('open');
}
function setZF(f) {
  zabfilt = f;
  ['all','film','serial','kniha','podcast','hudba','recept'].forEach(x => { document.getElementById('zf-' + x).className = 'sf-btn' + (x === f ? ' act-all' : ''); });
  renderList();
}
function setGF(f) {
  gfilt = f;
  ['all','cz','eu','svet'].forEach(x => { document.getElementById('gf-' + x).className = 'sf-btn' + (x === f ? ' act-all' : ''); });
  renderList();
}
function setSort(d) {
  sortDir = sortDir === d ? null : d;
  document.querySelectorAll('.sort-btn').forEach(b => {
    b.className = 'sf-btn sort-btn' + (b.dataset.dir === sortDir ? ' act-all' : '');
  });

}
function setTF(f) {
  tfilt = f;
  document.getElementById('tf-all').className  = 'sf-btn' + (f === 'all'  ? ' act-all' : '');
  document.getElementById('tf-cafe').className = 'sf-btn' + (f === 'cafe' ? ' act-all' : '');
  document.getElementById('tf-rest').className = 'sf-btn' + (f === 'rest' ? ' act-all' : '');
  renderList();
}
function toggleDK() {
  dkfilt = !dkfilt;
  const btn = document.getElementById('dk-toggle');
  btn.className = 'dk-toggle-btn' + (dkfilt ? ' active' : '');
  btn.textContent = dkfilt ? 'Vč. darovaných' : 'Jen nedarované';
  renderList();
}
function setSF(f) {
  sfilt = f;
  ['all','j','a'].forEach(x => { document.getElementById('sf-' + x).className = 'sf-btn' + (f === x ? ' act-' + x : ''); });
  renderList();
}
function filtered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let items = D[cat].filter(x => {
    if (sfilt !== 'all' && sk(x.sender) !== sfilt) return false;
    if (cat === 'darky' && !dkfilt) {
      const isDarovan = !!(getUD('darky', x.name).visited);
      if (isDarovan) return false;   // default: skryj darované
    }
    if (cat === 'tripiky'    && gfilt   !== 'all' && tripGeo(x)         !== gfilt)   return false;
    if (cat === 'restaurace' && tfilt   !== 'all' && dineType(x)         !== tfilt)   return false;
    if (cat === 'zabava'     && zabfilt !== 'all' && (x.type || '') !== zabfilt) return false;
    if (!q) return true;
    const h = [x.name, x.date, x.sender, x.who, x.note, x.dur, x.km ? x.km+'km' : ''].filter(Boolean).join(' ').toLowerCase();
    return h.includes(q);
  });
  if (sortDir) {
    items = [...items].sort((a, b) => {
      if (sortDir === 'null-first') {
        if (a.km == null && b.km == null) return 0;
        if (a.km == null) return -1;
        if (b.km == null) return 1;
        return 0;
      }
      if (a.km == null && b.km == null) return 0;
      if (a.km == null) return 1;
      if (b.km == null) return -1;
      return sortDir === 'asc' ? a.km - b.km : b.km - a.km;
    });
  }
  return items;
}
function renderList() {
  const items = filtered(); const body = document.getElementById('list-body'); body.innerHTML = '';
  if (cat === 'darky') {
    const groups = {};
    items.forEach(item => { const w = item.who || '?'; if (!groups[w]) groups[w] = []; groups[w].push(item); });
    for (const [w, arr] of Object.entries(groups)) {
      const lbl = document.createElement('div'); lbl.className = 'group-label'; lbl.textContent = w; body.appendChild(lbl);
      arr.forEach(item => body.appendChild(makeRow(item)));
      const sep = document.createElement('div'); sep.className = 'separator'; body.appendChild(sep);
    }
  } else { items.forEach(item => body.appendChild(makeRow(item))); }
}
function makeRow(item) {
  const idx = D[cat].indexOf(item); const ud = getUD(cat, item.name);
  const div = document.createElement('div');
  div.className = 'item' + (idx === sel ? ' selected' : '') + (ud.visited ? ' visited' : '');
  div.onclick = () => selectItem(idx);
  const av = document.createElement('div'); av.className = 'avatar ' + avClass(item.sender); av.textContent = avLabel(item.sender); div.appendChild(av);
  const main = document.createElement('div'); main.className = 'item-main';
  const nm = document.createElement('div'); nm.className = 'item-name'; nm.textContent = item.name; main.appendChild(nm);
  const meta = document.createElement('div'); meta.className = 'item-meta';
  if (item.url) { const d2 = document.createElement('div'); d2.className = 'link-dot'; meta.appendChild(d2); }
  if (item.date) { const d2 = document.createElement('span'); d2.textContent = item.date; meta.appendChild(d2); }
  if (cat === 'restaurace') {
    const t = document.createElement('span'); t.className = 'type-badge';
    const dt = dineType(item); t.textContent = dt === 'cafe' ? '☕' : '🍽️'; t.title = dt === 'cafe' ? 'Kavárna' : 'Restaurace';
    meta.prepend(t);
  }
  if (cat === 'zabava' && item.type) {
    const icons = {film:'🎬',serial:'📺',kniha:'📚',podcast:'🎧',hudba:'🎵',recept:'🍳'};
    const t = document.createElement('span'); t.className = 'type-badge'; t.textContent = icons[item.type] || ''; meta.prepend(t);
    if (item.duplicita) { const db = document.createElement('span'); db.className = 'dup-badge'; db.title = 'Možná duplicita'; db.textContent = '⚠ dup'; meta.appendChild(db); }
  }
  if (cat === 'tripiky' || cat === 'restaurace') {
    const km = ud.km_custom != null ? ud.km_custom : item.km;
    const dur = ud.dur_custom || item.dur;
    if (km != null) {
      const b = document.createElement('span'); b.className = 'dist-badge' + (ud.km_custom != null ? ' dist-custom' : '');
      b.textContent = km === 0 ? 'Praha' : km + 'km · ' + dur;
      meta.appendChild(b);
    }
  }
  main.appendChild(meta); div.appendChild(main);
  const right = document.createElement('div'); right.className = 'item-right';
  if (ud.stars > 0) { const s = document.createElement('div'); s.className = 'mini-stars'; s.textContent = '★'.repeat(ud.stars); right.appendChild(s); }
  if (ud.visited) { const v = document.createElement('div'); v.className = 'visited-check'; v.textContent = '✓'; right.appendChild(v); }
  div.appendChild(right); return div;
}
function selectItem(idx) {
  sel = idx; renderList(); buildDetail();
  const dp = document.getElementById('detail');
  if (window.innerWidth <= 680) dp.classList.add('open');
}
function refreshDetail() { if (sel !== null) buildDetail(); }
function backToList() { document.getElementById('detail').classList.remove('open'); }
function buildDetail() {
  const item = D[cat][sel]; const ud = getUD(cat, item.name);
  const catLabel = {tripiky:'Tripiky', restaurace:'Dine&Café', darky:'Dárky', zabava:'Zábava', ostatni:'Ostatní'}[cat];
  const visitedWord = cat === 'darky' ? 'Darováno' : cat === 'zabava' ? 'Hotovo' : cat === 'ostatni' ? 'Hotovo' : 'Navštíveno';
  let h = '<button class="back-btn" onclick="backToList()">← Zpět</button><div class="card">';
  let catLine = e(catLabel);
  if (cat === 'restaurace') { const dt = dineType(item); catLine += ' &nbsp;<span class="dine-type-chip">' + (dt === 'cafe' ? '☕ Kavárna' : '🍽️ Restaurace') + '</span>'; }
  if (cat === 'zabava' && item.type) { const icons = {film:'🎬 Film',serial:'📺 Seriál',kniha:'📚 Kniha',podcast:'🎧 Podcast',hudba:'🎵 Hudba',recept:'🍳 Recept'}; catLine += ' &nbsp;<span class="zab-type-chip">' + (icons[item.type] || item.type) + '</span>'; }
  if (item.duplicita) { catLine += ' &nbsp;<span class="dup-chip">⚠ duplicita</span>'; }
  h += '<div class="card-cat ' + cat + '">' + catLine + '</div><div class="card-header">';
  if (item.sender) h += '<span class="sender-badge ' + sbClass(item.sender) + '">' + e(item.sender) + '</span>';
  if (item.date) h += '<span class="date-chip">' + e(item.date) + '</span>';
  h += '</div>';
  if (item.who && cat === 'darky') h += '<div class="card-who">Pro: ' + e(item.who) + '</div>';
  h += '<div class="card-title">' + e(item.name) + '</div>';
  if (cat === 'tripiky' || cat === 'restaurace') {
    const km  = ud.km_custom  != null ? ud.km_custom  : item.km;
    const dur = ud.dur_custom || item.dur;
    if (km === 0) {
      h += '<div class="dist-block"><div class="dist-item"><div class="val">&#127961;</div><div class="lbl">v Praze</div></div></div>';
    } else if (km != null) {
      const lbl = ud.km_custom != null ? 'vzdalenost (vlastni)' : 'vzdalenost';
      h += '<div class="dist-block"><div class="dist-item"><div class="val">' + km + ' km</div><div class="lbl">' + lbl + '</div></div><div class="dist-item"><div class="val">' + e(dur) + '</div><div class="lbl">odhad jizdy</div></div></div>';
      if (ud.km_custom != null) h += '<button class="addr-clear-btn" onclick="clearAddr()">× Smazat vlastní vzdálenost</button>';
    }
    if (cat === 'tripiky' && item.km != null) h += '<p class="warning">* Odhad z Dvorce, Praha</p>';
  }
  if (item.note) h += '<div class="note-box">&#128205; ' + e(item.note) + '</div>';
  if (item.url) {
    const isMaps = item.url.includes('goo.gl') || item.url.includes('maps.app') || item.url.includes('mapy.cz');
    if (isMaps) h += '<a class="maps-link" href="' + e(item.url) + '" target="_blank" rel="noopener">&#128506; Otevrit na mape</a>';
    else h += '<a class="open-link" href="' + e(item.url) + '" target="_blank" rel="noopener">&#128279; ' + e(getDomain(item.url)) + '</a>';
  }
  if (cat === 'tripiky' || cat === 'restaurace') {
    const mu = 'https://www.google.com/maps/dir/Dvorec,+Praha/' + encodeURIComponent(item.name);
    h += '<a class="maps-link" href="' + mu + '" target="_blank" rel="noopener">&#129517; Navigovat z Dvorce</a>';
  }
  const sv = ud.stars || 0;
  h += '<div class="user-section"><div class="user-row"><div class="u-lbl">Hodnoceni</div><div class="stars-widget" id="sw">';
  for (let n = 1; n <= 5; n++) h += '<button class="star-btn' + (n <= sv ? ' on' : '') + '" onclick="setStar(' + n + ')" data-n="' + n + '">★</button>';
  h += '</div></div><div class="user-row"><div class="u-lbl">' + visitedWord + '</div>';
  h += '<label class="visited-toggle' + (ud.visited ? ' checked' : '') + '" id="vtgl" onclick="toggleVisited()">';
  h += '<div class="v-box"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>';
  h += '<span class="v-text" id="vtext">' + (ud.visited ? visitedWord + ' ✓' : 'Zatim ne') + '</span></label></div>';
  h += '<div><div class="pnote-lbl">Osobni poznamka</div><textarea class="pnote-ta" id="pnote" placeholder="Zapiste cokoliv..." oninput="saveNote()">' + e(ud.note || '') + '</textarea>';
  h += '<div class="save-hint">Ulozi se automaticky</div></div>';
  if (cat === 'tripiky' || cat === 'restaurace') {
    h += '<div class="addr-section"><div class="pnote-lbl">Adresa</div>';
    h += '<div style="display:flex;gap:6px;margin-top:4px"><input type="text" id="addr-input" class="pnote-ta" style="min-height:0;padding:6px 9px;flex:1" placeholder="např. Rámová 4, Praha" value="' + e(ud.address || '') + '"><button class="addr-btn" onclick="calcAddr()">↗ km</button></div>';
    h += '<div class="save-hint" id="addr-hint">Spočítá vzdálenost od Dvorce a uloží do Firebase</div></div>';
  }
  h += '</div></div>';
  document.getElementById('detail').innerHTML = h;
}
function setStar(n) {
  const item = D[cat][sel]; const ud = getUD(cat, item.name); const nv = ud.stars === n ? 0 : n;
  saveField(cat, item.name, 'stars', nv);
  document.querySelectorAll('.star-btn').forEach(b => b.classList.toggle('on', parseInt(b.dataset.n) <= nv));
  renderList();
}
function toggleVisited() {
  const item = D[cat][sel]; const ud = getUD(cat, item.name); const nv = !ud.visited;
  saveField(cat, item.name, 'visited', nv);
  const visitedWord = cat === 'darky' ? 'Darovano' : 'Navstiveno';
  const lbl = document.getElementById('vtgl'); const txt = document.getElementById('vtext');
  if (nv) { lbl.className = 'visited-toggle checked'; txt.textContent = visitedWord + ' ✓'; }
  else { lbl.className = 'visited-toggle'; txt.textContent = 'Zatim ne'; }
  renderList();
}
let noteTimer = null;
function saveNote() {
  clearTimeout(noteTimer);
  noteTimer = setTimeout(() => { saveField(cat, D[cat][sel].name, 'note', document.getElementById('pnote').value); }, 600);
}
async function calcAddr() {
  const input = document.getElementById('addr-input');
  const hint  = document.getElementById('addr-hint');
  const btn   = document.querySelector('.addr-btn');
  const addr  = input ? input.value.trim() : '';
  if (!addr) { if (hint) hint.textContent = 'Zadej adresu.'; return; }
  btn.textContent = '⏳'; btn.disabled = true;
  if (hint) hint.textContent = 'Hledám...';
  try {
    const params = new URLSearchParams({q: addr, format: 'json', limit: 1});
    const resp = await fetch('https://nominatim.openstreetmap.org/search?' + params, {headers:{'Accept':'application/json'}});
    const res  = await resp.json();
    if (!res.length) {
      if (hint) hint.textContent = 'Adresa nenalezena — upřesni (přidej město).';
      btn.textContent = '↗ km'; btn.disabled = false; return;
    }
    const lat = parseFloat(res[0].lat), lon = parseFloat(res[0].lon);
    const R = 6371, dLat = (lat-50.0166)*Math.PI/180, dLon = (lon-14.4239)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(50.0166*Math.PI/180)*Math.cos(lat*Math.PI/180)*Math.sin(dLon/2)**2;
    const straight = R*2*Math.asin(Math.sqrt(a));
    const km = Math.round(straight*1.35);
    const mins = Math.round(km/45*60);
    const dur  = mins < 60 ? mins+'min' : Math.floor(mins/60)+'h '+(mins%60?mins%60+'min':'');
    const item = D[cat][sel]; const ud = getUD(cat, item.name);
    ud.km_custom = km; ud.dur_custom = dur; ud.address = addr;
    setUD(cat, item.name, ud);
    renderList(); buildDetail();
  } catch(err) {
    if (hint) hint.textContent = 'Chyba: ' + err.message;
    btn.textContent = '↗ km'; btn.disabled = false;
  }
}
function clearAddr() {
  const item = D[cat][sel]; const ud = getUD(cat, item.name);
  delete ud.km_custom; delete ud.dur_custom; delete ud.address;
  setUD(cat, item.name, ud);
  renderList(); buildDetail();
}
function getDomain(url) { try { return new URL(url).hostname.replace('www.',''); } catch(e) { return url.slice(0,40); } }
function e(s) { if (s == null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtNow() {
  const n = new Date(); const pad = x => String(x).padStart(2,'0');
  return pad(n.getDate())+'.'+pad(n.getMonth()+1)+'.'+String(n.getFullYear()).slice(2)+'.'+pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());
}
function doRefresh() {
  const url = new URL(location.href);
  url.searchParams.set('v', Date.now());
  location.href = url.toString();
}
document.getElementById('cnt-tripiky').textContent = D.tripiky.length;
document.getElementById('cnt-restaurace').textContent = D.restaurace.length;
document.getElementById('cnt-darky').textContent = D.darky.length;
document.getElementById('cnt-zabava').textContent = D.zabava.length;
document.getElementById('cnt-ostatni').textContent = D.ostatni.length;
document.getElementById('refresh-time').textContent = fmtNow();
if (GH_USER && !GH_USER.startsWith('TVOJE')) {
  fetch('https://api.github.com/repos/' + GH_USER + '/' + GH_REPO + '/commits?path=chat_dashboard.html&per_page=1')
    .then(r => r.json()).then(d => {
      if (d && d[0] && d[0].commit) {
        const dt = new Date(d[0].commit.committer.date); const pad = x => String(x).padStart(2,'0');
        document.getElementById('data-date').textContent = pad(dt.getDate())+'.'+pad(dt.getMonth()+1)+'.'+String(dt.getFullYear()).slice(2)+' '+pad(dt.getHours())+':'+pad(dt.getMinutes());
      }
    }).catch(() => { document.getElementById('data-date').textContent = fmtNow(); });
} else { document.getElementById('data-date').textContent = fmtNow(); }
// ── Theme toggle
function toggleTheme() {
  const isLight = document.body.getAttribute('data-theme') === 'light' ||
    (!document.body.getAttribute('data-theme') && window.matchMedia('(prefers-color-scheme: light)').matches);
  const next = isLight ? 'dark' : 'light';
  document.body.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('theme-toggle').textContent = next === 'light' ? '🌙' : '☀️';
}
(function() {
  const saved = localStorage.getItem('theme');
  if (saved) document.body.setAttribute('data-theme', saved);
  const isLight = (saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')) === 'light';
  document.getElementById('theme-toggle').textContent = isLight ? '🌙' : '☀️';
})();
// ── Hide Ostatní tab if empty
(function() {
  const t = document.querySelector('.tab[data-cat="ostatni"]');
  if (t) t.style.display = D.ostatni.length ? '' : 'none';

initFB();
renderList();
