<!DOCTYPE html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dzwirovaci chytrackovani</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f1117;color:#e2e8f0;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.header{padding:12px 18px 0;flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between}
.header-left h1{font-size:1.1rem;font-weight:700;color:#f8fafc;letter-spacing:-.02em}
.header-left p{font-size:.68rem;color:#334155;margin-top:1px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#334155;margin-top:5px;flex-shrink:0}
.sync-dot.online{background:#22c55e}
.sync-dot.syncing{background:#f59e0b;animation:pulse 1s infinite}
.refresh-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:1px solid #1e2a3a;border-radius:8px;color:#475569;cursor:pointer;padding:4px 8px;font-size:.62rem;transition:all .15s;-webkit-tap-highlight-color:transparent}
.refresh-btn:hover{border-color:#334155;color:#64748b}
.refresh-btn:active{background:#1e2330}
.refresh-btn span{font-size:.7rem}
.refresh-time{font-size:.58rem;color:#334155}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.tabs{display:flex;gap:5px;padding:8px 18px 0;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 13px;border-radius:9px;border:none;cursor:pointer;font-size:.76rem;font-weight:600;transition:all .15s;background:#1e2330;color:#64748b;white-space:nowrap;flex-shrink:0}
.tab:hover{background:#252d3d;color:#94a3b8}
.tab.active{color:#fff}
.tab[data-cat="tripiky"].active{background:#1d4ed8}
.tab[data-cat="restaurace"].active{background:#065f46}
.tab[data-cat="darky"].active{background:#7c2d12}
.tab-count{display:inline-block;padding:1px 5px;border-radius:8px;font-size:.65rem;margin-left:3px;background:rgba(255,255,255,.1);color:#94a3b8}
.tab.active .tab-count{background:rgba(255,255,255,.2);color:#fff}
.main{display:flex;flex:1;overflow:hidden;margin-top:8px}

/* LIST */
.list-panel{width:340px;min-width:200px;border-right:1px solid #1a2035;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
.list-panel::-webkit-scrollbar{width:3px}
.list-panel::-webkit-scrollbar-thumb{background:#2d3748;border-radius:3px}
.filter-bar{padding:7px 8px;position:sticky;top:0;background:#0f1117;z-index:10;display:flex;gap:5px;flex-shrink:0}
.filter-bar input{flex:1;padding:6px 10px;border-radius:7px;border:1px solid #1e2a3a;background:#161b28;color:#e2e8f0;font-size:.75rem;outline:none;min-width:0}
.filter-bar input:focus{border-color:#3b82f6}
.filter-bar input::placeholder{color:#334155}
.sender-filter{display:flex;gap:3px;flex-shrink:0}
.sf-btn{padding:4px 7px;border-radius:6px;border:1px solid #1e2a3a;cursor:pointer;font-size:.64rem;font-weight:700;background:#161b28;color:#475569;transition:all .12s;white-space:nowrap}
.sf-btn.act-all{background:#1e2330;border-color:#334155;color:#94a3b8}
.sf-btn.act-j{background:#1e3a5f;border-color:#3b82f6;color:#60a5fa}
.sf-btn.act-a{background:#431407;border-color:#ea580c;color:#fb923c}
.sf-btn.act-n{background:#14291a;border-color:#16a34a;color:#4ade80}
.list-body{flex:1;overflow-y:auto}
.list-body::-webkit-scrollbar{width:3px}
.list-body::-webkit-scrollbar-thumb{background:#1e2a3a;border-radius:3px}

.group-label{padding:5px 11px 2px;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#334155;margin-top:2px}
.separator{height:1px;background:#111827;margin:3px 0}
.item{padding:7px 9px 7px 11px;cursor:pointer;border-left:3px solid transparent;transition:background .1s;display:flex;align-items:flex-start;gap:7px}
.item:hover{background:#131929}
.item.selected{background:#0e1f35;border-left-color:#3b82f6}
.item.visited .item-name{color:#475569;text-decoration:line-through}
.avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:800;flex-shrink:0;margin-top:1px}
.av-j{background:#1e3a5f;color:#60a5fa}
.av-a{background:#431407;color:#fb923c}
.av-n{background:#14291a;color:#4ade80}
.item-main{flex:1;min-width:0}
.item-name{font-size:.77rem;color:#cbd5e1;font-weight:500;line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.item-meta{font-size:.64rem;color:#334155;display:flex;gap:4px;align-items:center;flex-wrap:wrap;margin-top:2px}
.link-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;flex-shrink:0}
.dist-badge{background:#1e2a3a;color:#60a5fa;border-radius:5px;padding:1px 5px;font-size:.62rem;font-weight:600;white-space:nowrap}
.item-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.mini-stars{font-size:.62rem;color:#f59e0b;line-height:1;letter-spacing:-1px}
.visited-check{font-size:.68rem;color:#22c55e}

/* DETAIL */
.detail-panel{flex:1;padding:16px 20px;overflow-y:auto}
.detail-panel::-webkit-scrollbar{width:3px}
.detail-panel::-webkit-scrollbar-thumb{background:#2d3748;border-radius:3px}
.empty{display:flex;align-items:center;justify-content:center;height:100%;color:#1e293b;flex-direction:column;gap:8px}
.empty .icon{font-size:2rem}
.empty p{font-size:.8rem}

/* BACK BUTTON (mobile only) */
.back-btn{display:none;align-items:center;gap:6px;background:none;border:none;color:#60a5fa;font-size:.82rem;font-weight:600;cursor:pointer;padding:0 0 12px 0}

.card{background:#131929;border-radius:12px;padding:18px 20px;max-width:580px;border:1px solid #1a2035}
.card-cat{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.card-cat.tripiky{color:#60a5fa}
.card-cat.restaurace{color:#34d399}
.card-cat.darky{color:#fb923c}
.card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.sender-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:.7rem;font-weight:700}
.sb-j{background:#1e3a5f;color:#60a5fa}
.sb-a{background:#431407;color:#fb923c}
.sb-n{background:#14291a;color:#4ade80}
.date-chip{font-size:.65rem;color:#334155}
.card-who{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.67rem;font-weight:700;background:#7c2d12;color:#fdba74;margin-bottom:8px}
.card-title{font-size:1rem;font-weight:700;color:#f1f5f9;line-height:1.4;margin-bottom:12px}
.dist-block{display:flex;gap:10px;margin-bottom:12px}
.dist-item{background:#0c1524;border-radius:8px;padding:7px 12px;flex:1;text-align:center}
.dist-item .val{font-size:1.05rem;font-weight:700;color:#60a5fa}
.dist-item .lbl{font-size:.6rem;color:#475569;margin-top:1px;text-transform:uppercase;letter-spacing:.06em}
.note-box{margin-top:8px;padding:8px 11px;background:#0c1524;border-radius:7px;font-size:.73rem;color:#475569;border-left:3px solid #1e3a5f}
.open-link,.maps-link{display:inline-flex;align-items:center;gap:5px;margin-top:10px;margin-right:6px;padding:8px 14px;border-radius:8px;text-decoration:none;font-size:.75rem;font-weight:600;transition:all .12s}
.open-link{background:#0c1524;border:1px solid #1e2a3a;color:#60a5fa}
.open-link:hover{background:#101e38;border-color:#3b82f6}
.maps-link{background:#0c1524;border:1px solid #1e2a3a;color:#34d399}
.maps-link:hover{background:#0a1f14;border-color:#34d399}
.warning{font-size:.66rem;color:#334155;margin-top:5px;font-style:italic}

/* USER SECTION */
.user-section{margin-top:14px;border-top:1px solid #1a2035;padding-top:12px;display:flex;flex-direction:column;gap:9px}
.user-row{display:flex;align-items:center;gap:10px}
.u-lbl{font-size:.63rem;font-weight:700;color:#334155;text-transform:uppercase;letter-spacing:.05em;min-width:58px}
.stars-widget{display:flex;gap:3px}
.star-btn{font-size:1.15rem;cursor:pointer;background:none;border:none;padding:0;color:#1e2a3a;transition:color .1s;line-height:1;-webkit-tap-highlight-color:transparent}
.star-btn.on{color:#f59e0b}
.star-btn:hover{color:#fbbf24}
.visited-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.v-box{width:18px;height:18px;border-radius:5px;border:2px solid #2d3748;background:#0c1524;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.visited-toggle.checked .v-box{background:#16a34a;border-color:#16a34a}
.v-box svg{display:none}
.visited-toggle.checked .v-box svg{display:block}
.v-text{font-size:.77rem;color:#64748b}
.visited-toggle.checked .v-text{color:#22c55e}
.pnote-lbl{font-size:.63rem;font-weight:700;color:#334155;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.pnote-ta{width:100%;background:#0c1524;border:1px solid #1e2a3a;border-radius:7px;color:#94a3b8;font-size:.75rem;padding:7px 9px;resize:vertical;min-height:55px;outline:none;font-family:inherit;line-height:1.5}
.pnote-ta:focus{border-color:#3b82f6;color:#cbd5e1}
.pnote-ta::placeholder{color:#1e3a5f}
.save-hint{font-size:.61rem;color:#1e3a5f;margin-top:2px}

/* RESPONSIVE */
@media (max-width:680px){
  body{overflow:auto}
  .main{overflow:visible;flex-direction:column}
  .list-panel{width:100%;border-right:none;border-bottom:1px solid #1a2035;min-height:0;max-height:none;overflow:visible}
  .list-body{max-height:60vh;overflow-y:auto}
  .detail-panel{
    position:fixed;inset:0;z-index:300;background:#0f1117;
    padding:14px 16px;overflow-y:auto;
    display:none;transform:translateX(100%);transition:transform .2s ease
  }
  .detail-panel.open{display:block;transform:translateX(0)}
  .back-btn{display:flex}
}
</style>
</head>

let cat = 'tripiky', sel = null, sfilt = 'all';
let cache = {};
let fbDb = null;
const dot = document.getElementById('sync-dot');

// ── Firebase init ──────────────────────────────────────────────────
function initFB() {
  if (!FIREBASE_CONFIG.apiKey) {
    console.warn('Firebase není nastaven – používám localStorage');
    loadFromLocalStorage();
    dot.title = 'Offline (localStorage)';
    return;
  }
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    fbDb = firebase.database();
    dot.classList.add('syncing');
    dot.title = 'Připojuji...';
    fbDb.ref('userdata').on('value', snap => {
      cache = snap.val() || {};
      dot.classList.remove('syncing');
      dot.classList.add('online');
      dot.title = 'Online – synchronizováno';
      renderList();
      if (sel !== null) refreshDetail();
    }, err => {
      console.error('Firebase chyba:', err);
      dot.title = 'Chyba připojení';
      loadFromLocalStorage();
    });
  } catch(e) {
    console.error(e);
    loadFromLocalStorage();
  }
}

function loadFromLocalStorage() {
  // Migrate old keys
  for(let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('dchat')) {
      try { cache[k] = JSON.parse(localStorage.getItem(k)); } catch(e) {}
    }
  }
  renderList();
}

// ── Storage helpers ────────────────────────────────────────────────
function fbKey(c, name) {
  return 'dchat2_' + c + '_' + name.slice(0,40).replace(/[.#$\[\]/\s]/g, '_');
}
function getUD(c, name) {
  return cache[fbKey(c, name)] || {};
}
function setUD(c, name, obj) {
  const k = fbKey(c, name);
  cache[k] = obj;
  if (fbDb) {
    dot.classList.add('syncing');
    fbDb.ref('userdata/' + k).set(obj).then(() => dot.classList.remove('syncing'));
  } else {
    localStorage.setItem(k, JSON.stringify(obj));
  }
}
function saveField(c, name, field, val) {
  const d = getUD(c, name);
  d[field] = val;
  setUD(c, name, d);
}

// ── Sender helpers ─────────────────────────────────────────────────
function sk(s) {
  if (!s) return '?';
  const l = s.toLowerCase();
  if (l.includes('josh')) return 'j';
  if (l.includes('andrea') || l.includes('andreika')) return 'a';
  if (l.includes('nuttela') || l.includes('nutelka') || l.includes('nutel')) return 'n';
  return '?';
}
function avClass(s) { return {j:'av-j',a:'av-a',n:'av-n'}[sk(s)] || 'av-n'; }
function avLabel(s) { return {j:'J',a:'A',n:'N'}[sk(s)] || '?'; }
function sbClass(s) { return {j:'sb-j',a:'sb-a',n:'sb-n'}[sk(s)] || 'sb-n'; }

// ── Tab & filter ───────────────────────────────────────────────────
function switchTab(c) {
  cat = c; sel = null;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.cat === c));
  document.getElementById('search').value = '';
  renderList();
  const dp = document.getElementById('detail');
  dp.innerHTML = '<div class="empty"><div class="icon">&#128072;</div><p>Vyber polozku vlevo</p></div>';
  dp.classList.remove('open');
}

function setSF(f) {
  sfilt = f;
  ['all','j','a','n'].forEach(x => {
    const btn = document.getElementById('sf-' + x);
    btn.className = 'sf-btn' + (f === x ? ' act-' + x : '');
  });
  renderList();
}

function filtered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  return D[cat].filter(x => {
    if (sfilt !== 'all' && sk(x.sender) !== sfilt) return false;
    if (!q) return true;
    const h = [x.name, x.date, x.sender, x.who, x.note, x.dur, x.km ? x.km+'km' : ''].filter(Boolean).join(' ').toLowerCase();
    return h.includes(q);
  });
}

// ── Render list ────────────────────────────────────────────────────
function renderList() {
  const items = filtered();
  const body = document.getElementById('list-body');
  body.innerHTML = '';
  if (cat === 'darky') {
    const groups = {};
    items.forEach(item => { const w = item.who || '?'; if (!groups[w]) groups[w] = []; groups[w].push(item); });
    for (const [w, arr] of Object.entries(groups)) {
      const lbl = document.createElement('div'); lbl.className = 'group-label'; lbl.textContent = w; body.appendChild(lbl);
      arr.forEach(item => body.appendChild(makeRow(item)));
      const sep = document.createElement('div'); sep.className = 'separator'; body.appendChild(sep);
    }
  } else {
    items.forEach(item => body.appendChild(makeRow(item)));
  }
}

function makeRow(item) {
  const idx = D[cat].indexOf(item);
  const ud = getUD(cat, item.name);
  const div = document.createElement('div');
  div.className = 'item' + (idx === sel ? ' selected' : '') + (ud.visited ? ' visited' : '');
  div.onclick = () => selectItem(idx);
  // Avatar
  const av = document.createElement('div');
  av.className = 'avatar ' + avClass(item.sender);
  av.textContent = avLabel(item.sender);
  div.appendChild(av);
  // Main
  const main = document.createElement('div'); main.className = 'item-main';
  const nm = document.createElement('div'); nm.className = 'item-name'; nm.textContent = item.name; main.appendChild(nm);
  const meta = document.createElement('div'); meta.className = 'item-meta';
  if (item.url) { const dot = document.createElement('div'); dot.className = 'link-dot'; dot.title = 'Ma odkaz'; meta.appendChild(dot); }
  if (item.date) { const d = document.createElement('span'); d.textContent = item.date; meta.appendChild(d); }
  if (item.km != null && cat === 'tripiky') {
    const b = document.createElement('span'); b.className = 'dist-badge';
    b.textContent = item.km === 0 ? 'Praha' : (item.km ? item.km + 'km · ' + item.dur : 'nelze');
    meta.appendChild(b);
  }
  main.appendChild(meta); div.appendChild(main);
  // Right
  const right = document.createElement('div'); right.className = 'item-right';
  if (ud.stars > 0) { const s = document.createElement('div'); s.className = 'mini-stars'; s.textContent = '★'.repeat(ud.stars); right.appendChild(s); }
  if (ud.visited) { const v = document.createElement('div'); v.className = 'visited-check'; v.textContent = '✓'; right.appendChild(v); }
  div.appendChild(right);
  return div;
}

// ── Detail ─────────────────────────────────────────────────────────
function selectItem(idx) {
  sel = idx; renderList();
  buildDetail();
  const dp = document.getElementById('detail');
  if (window.innerWidth <= 680) dp.classList.add('open');
}

function refreshDetail() { if (sel !== null) buildDetail(); }

function backToList() {
  document.getElementById('detail').classList.remove('open');
}

function buildDetail() {
  const item = D[cat][sel];
  const ud = getUD(cat, item.name);
  const catLabel = {tripiky:'Tripiky', restaurace:'Restaurace & Kavarny', darky:'Darky'}[cat];
  const visitedWord = cat === 'darky' ? 'Darovano' : 'Navstiveno';

  let h = '<button class="back-btn" onclick="backToList()">&#8592; Zpět</button>';
  h += '<div class="card">';
  h += '<div class="card-cat ' + cat + '">' + e(catLabel) + '</div>';
  h += '<div class="card-header">';
  if (item.sender) {
    h += '<span class="sender-badge ' + sbClass(item.sender) + '">' + e(item.sender) + '</span>';
  }
  if (item.date) h += '<span class="date-chip">' + e(item.date) + '</span>';
  h += '</div>';
  if (item.who && cat === 'darky') h += '<div class="card-who">Pro: ' + e(item.who) + '</div>';
  h += '<div class="card-title">' + e(item.name) + '</div>';

  if (cat === 'tripiky') {
    if (item.km === 0) {
      h += '<div class="dist-block"><div class="dist-item"><div class="val">&#127961;&#65039;</div><div class="lbl">v Praze</div></div></div>';
    } else if (item.km == null) {
      h += '<div class="dist-block"><div class="dist-item"><div class="val">&#128506;</div><div class="lbl">' + e(item.dur || 'viz odkaz') + '</div></div></div>';
    } else {
      h += '<div class="dist-block"><div class="dist-item"><div class="val">' + item.km + ' km</div><div class="lbl">vzdalenost</div></div><div class="dist-item"><div class="val">' + e(item.dur) + '</div><div class="lbl">jizda So 10:00</div></div></div>';
    }
    h += '<p class="warning">* Odhad z Dvorce, Praha &mdash; over v Google Maps</p>';
  }

  if (item.note) h += '<div class="note-box">&#128205; ' + e(item.note) + '</div>';

  if (item.url) {
    const domain = getDomain(item.url);
    const isMaps = item.url.includes('goo.gl') || item.url.includes('maps.app') || item.url.includes('mapy.cz');
    if (isMaps) {
      h += '<a class="maps-link" href="' + e(item.url) + '" target="_blank" rel="noopener">&#128506; Otevrit na mape</a>';
    } else {
      h += '<a class="open-link" href="' + e(item.url) + '" target="_blank" rel="noopener">&#128279; ' + e(domain) + '</a>';
    }
  }
  if (cat === 'tripiky') {
    const mu = 'https://www.google.com/maps/dir/Dvorec,+Praha/' + encodeURIComponent(item.name);
    h += '<a class="maps-link" href="' + mu + '" target="_blank" rel="noopener">&#129517; Navigovat z Dvorce</a>';
  }

  const starsVal = ud.stars || 0;
  h += '<div class="user-section">';
  h += '<div class="user-row"><div class="u-lbl">Hodnoceni</div><div class="stars-widget" id="sw">';
  for (let n = 1; n <= 5; n++) h += '<button class="star-btn' + (n <= starsVal ? ' on' : '') + '" onclick="setStar(' + n + ')" data-n="' + n + '">★</button>';
  h += '</div></div>';
  h += '<div class="user-row"><div class="u-lbl">' + visitedWord + '</div>';
  h += '<label class="visited-toggle' + (ud.visited ? ' checked' : '') + '" id="vtgl" onclick="toggleVisited()">';
  h += '<div class="v-box"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>';
  h += '<span class="v-text" id="vtext">' + (ud.visited ? visitedWord + ' ✓' : 'Zatim ne') + '</span></label></div>';
  h += '<div><div class="pnote-lbl">Osobni poznamka</div>';
  h += '<textarea class="pnote-ta" id="pnote" placeholder="Zapiste cokoliv..." oninput="saveNote()">' + e(ud.note || '') + '</textarea>';
  h += '<div class="save-hint">Ulozi se automaticky</div></div>';
  h += '</div></div>';

  document.getElementById('detail').innerHTML = h;
}

// ── User interactions ──────────────────────────────────────────────
function setStar(n) {
  const item = D[cat][sel]; const ud = getUD(cat, item.name);
  const nv = ud.stars === n ? 0 : n;
  saveField(cat, item.name, 'stars', nv);
  document.querySelectorAll('.star-btn').forEach(b => b.classList.toggle('on', parseInt(b.dataset.n) <= nv));
  renderList();
}
function toggleVisited() {
  const item = D[cat][sel]; const ud = getUD(cat, item.name);
  const nv = !ud.visited;
  saveField(cat, item.name, 'visited', nv);
  const visitedWord = cat === 'darky' ? 'Darovano' : 'Navstiveno';
  const lbl = document.getElementById('vtgl'); const txt = document.getElementById('vtext');
  if (nv) { lbl.className = 'visited-toggle checked'; txt.textContent = visitedWord + ' ✓'; }
  else { lbl.className = 'visited-toggle'; txt.textContent = 'Zatim ne'; }
  renderList();
}
let noteTimer = null;
function saveNote() {
  clearTimeout(noteTimer);
  noteTimer = setTimeout(() => {
    saveField(cat, D[cat][sel].name, 'note', document.getElementById('pnote').value);
  }, 600);
}

function getDomain(url) { try { return new URL(url).hostname.replace('www.',''); } catch(e) { return url.slice(0,40); } }
function e(s) { if (s == null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Refresh ────────────────────────────────────────────────────────
function fmtNow() {
  const n = new Date();
  const pad = x => String(x).padStart(2,'0');
  return pad(n.getDate()) + '.' + pad(n.getMonth()+1) + '.' + String(n.getFullYear()).slice(2)
    + '.' + pad(n.getHours()) + ':' + pad(n.getMinutes()) + ':' + pad(n.getSeconds());
}
function doRefresh() {
  if (fbDb) {
    const dot = document.getElementById('sync-dot');
    dot.classList.add('syncing');
    fbDb.ref('userdata').once('value', snap => {
      cache = snap.val() || {};
      dot.classList.remove('syncing');
      dot.classList.add('online');
      renderList();
      if (sel !== null) refreshDetail();
      document.getElementById('refresh-time').textContent = fmtNow();
    });
  } else {
    location.reload();
  }
}

// ── Init ───────────────────────────────────────────────────────────
document.getElementById('cnt-tripiky').textContent = D.tripiky.length;
document.getElementById('cnt-restaurace').textContent = D.restaurace.length;
document.getElementById('cnt-darky').textContent = D.darky.length;
// Načti datum posledního commitu z GitHub API
if (GH_USER && GH_REPO && !GH_USER.startsWith('TVOJE')) {
  fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/commits?path=chat_dashboard.html&per_page=1`)
    .then(r => r.json())
    .then(data => {
      if (data && data[0] && data[0].commit) {
        const d = new Date(data[0].commit.committer.date);
        const pad = x => String(x).padStart(2,'0');
        const fmt = pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+String(d.getFullYear()).slice(2)
          +' '+pad(d.getHours())+':'+pad(d.getMinutes());
        document.getElementById('data-date').textContent = fmt;
      }
    })
    .catch(() => {});
} else {
  document.getElementById('data-date').textContent = fmtNow();
}
document.getElementById('refresh-time').textContent = fmtNow();
initFB();
renderList();
</script>
</body>
</html>
